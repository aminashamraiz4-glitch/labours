<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labour Booking Chatbot</title>

  <!-- Bootstrap (optional for styling) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 0;
    }

    .chatbot-container {
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      font-size: 1.1rem;
    }

    /* You can adjust the chatbot icon position here */
    .chatbase-bubble {
      bottom: 20px !important;
      right: 20px !important;
    }
  </style>
</head>

<body>
  <div class="chatbot-container">
    <h1>Welcome to Labour Booking Website</h1>
    <p>Chat with our assistant below if you have any questions!</p>
  </div>

  <!-- 🔹 Chatbase Embed Code -->
  <script>
    (function () {
      if (!window.chatbase || window.chatbase("getState") !== "initialized") {
        window.chatbase = (...arguments) => {
          if (!window.chatbase.q) {
            window.chatbase.q = [];
          }
          window.chatbase.q.push(arguments);
        };
        window.chatbase = new Proxy(window.chatbase, {
          get(target, prop) {
            if (prop === "q") {
              return target.q;
            }
            return (...args) => target(prop, ...args);
          },
        });
      }
      const onLoad = function () {
        const script = document.createElement("script");
        script.src = "https://www.chatbase.co/embed.min.js";
        script.id = "stJk6I90fFqhsk8fOBo8v";  <!-- ⚠️ Use your own Chatbase bot ID -->
        script.domain = "www.chatbase.co";
        document.body.appendChild(script);
      };
      if (document.readyState === "complete") {
        onLoad();
      } else {
        window.addEventListener("load", onLoad);
      }
    })();
  </script>
</body>
</html>
